{% extends "base.html" %}
{% block content %}

<div class="flex items-center justify-between mb-4">
  <h1 class="text-xl font-semibold">Account Balances</h1>
  <button id="sync-btn"
    class="text-sm bg-blue-500 text-white px-3 py-1.5 rounded hover:bg-blue-600 disabled:opacity-50"
    hx-post="/api/monarch/sync"
    hx-target="#sync-status"
    hx-swap="innerHTML"
    hx-indicator="#sync-btn"
    hx-on::after-request="if(event.detail.successful) htmx.trigger('#balances-table', 'refresh')">
    Sync from Monarch
  </button>
</div>

<span id="sync-status" class="text-sm text-gray-500"></span>

<!-- Filter -->
<form method="get" class="flex gap-3 mb-4 text-sm">
  <select name="account_id" class="border rounded px-2 py-1">
    <option value="">All Accounts</option>
    {% for a in accounts %}
      <option value="{{ a.id }}" {{ 'selected' if request.args.get('account_id') == a.id|string }}>{{ a.name }}</option>
    {% endfor %}
  </select>
  <button type="submit" class="bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded">Filter</button>
  <a href="/balances" class="text-gray-400 hover:text-gray-600 px-2 py-1">Clear</a>
</form>

{% include "partials/balances_table.html" %}

<p class="text-xs text-gray-400 mt-2">{{ rows|length }} rows</p>

<script>
  document.body.addEventListener("htmx:afterRequest", function(evt) {
    if (evt.detail.elt.id === "sync-btn") {
      const status = document.getElementById("sync-status");
      if (evt.detail.successful) {
        try {
          const data = JSON.parse(evt.detail.xhr.responseText);
          status.textContent = data.error
            ? "Error: " + data.error
            : "Synced " + data.synced + " account(s).";
        } catch (e) {
          status.textContent = "Sync complete.";
        }
      } else {
        try {
          const data = JSON.parse(evt.detail.xhr.responseText);
          status.textContent = "Error: " + (data.error || "Unknown error");
        } catch (e) {
          status.textContent = "Sync failed.";
        }
      }
    }
  });
</script>

{% endblock %}
