<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-6">
    <span class="font-bold text-lg">Pay Dashboard</span>
    <a href="/" class="text-sm {% if request.path == '/' %}text-blue-600 font-medium{% else %}text-gray-500 hover:text-gray-900{% endif %}">Statements</a>
    <a href="/charts" class="text-sm {% if request.path == '/charts' %}text-blue-600 font-medium{% else %}text-gray-500 hover:text-gray-900{% endif %}">Charts</a>
  </nav>

  <main class="p-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
