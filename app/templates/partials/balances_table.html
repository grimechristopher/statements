<div id="balances-table" class="overflow-x-auto rounded-lg border border-gray-200 bg-white"
  hx-get="/balances-table" hx-trigger="refresh" hx-swap="outerHTML">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 text-xs text-gray-500 uppercase">
      <tr>
        <th class="px-3 py-2 text-left">Date</th>
        <th class="px-3 py-2 text-left">Account</th>
        <th class="px-3 py-2 text-left">Type</th>
        <th class="px-3 py-2 text-left">Institution</th>
        <th class="px-3 py-2 text-right">Balance</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr class="border-t border-gray-100 hover:bg-gray-50">
        <td class="px-3 py-2">{{ row.date }}</td>
        <td class="px-3 py-2 font-medium">{{ row.name }}</td>
        <td class="px-3 py-2 capitalize text-gray-500">{{ row.type or '—' }}</td>
        <td class="px-3 py-2 text-gray-500">{{ row.institution or '—' }}</td>
        <td class="px-3 py-2 text-right {{ 'text-red-600' if row.balance < 0 else '' }}">
          ${{ "{:,.2f}".format(row.balance) }}
        </td>
      </tr>
      {% else %}
      <tr><td colspan="5" class="px-3 py-6 text-center text-gray-400">No balances yet — click Sync to fetch from Monarch.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
