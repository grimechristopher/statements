{% extends "base.html" %}
{% block content %}

<div class="flex items-center gap-4 mb-6">
  <h1 class="text-xl font-semibold">Charts</h1>
  <select id="person-filter" class="border rounded px-2 py-1 text-sm">
    <option value="">All People</option>
    {% for p in people %}
      <option value="{{ p.id }}">{{ p.name }}</option>
    {% endfor %}
  </select>
</div>

<!-- Summary Cards -->
<div id="summary-cards" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

<!-- Charts grid -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

  <div class="bg-white rounded-lg border border-gray-200 p-4">
    <h2 class="text-sm font-medium text-gray-600 mb-3">Gross Pay Over Time</h2>
    <canvas id="chart-gross"></canvas>
  </div>

  <div class="bg-white rounded-lg border border-gray-200 p-4">
    <h2 class="text-sm font-medium text-gray-600 mb-3">Tax % Over Time</h2>
    <canvas id="chart-taxes-pct"></canvas>
  </div>

  <div class="bg-white rounded-lg border border-gray-200 p-4">
    <h2 class="text-sm font-medium text-gray-600 mb-3">Savings % Over Time</h2>
    <canvas id="chart-savings-pct"></canvas>
  </div>

  <div class="bg-white rounded-lg border border-gray-200 p-4">
    <h2 class="text-sm font-medium text-gray-600 mb-3">401k Contributions Per Period</h2>
    <canvas id="chart-401k"></canvas>
  </div>

  <div class="bg-white rounded-lg border border-gray-200 p-4">
    <h2 class="text-sm font-medium text-gray-600 mb-3">Hours Worked Per Period</h2>
    <canvas id="chart-hours"></canvas>
  </div>

  <div class="bg-white rounded-lg border border-gray-200 p-4">
    <h2 class="text-sm font-medium text-gray-600 mb-3">Annual Totals</h2>
    <canvas id="chart-annual"></canvas>
  </div>

</div>

<!-- Retirement Section -->
<div class="flex items-center gap-4 mt-10 mb-4">
  <h2 class="text-lg font-semibold">Retirement Investments</h2>
</div>

<div id="retirement-summary-cards" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

<div class="bg-white rounded-lg border border-gray-200 p-4 mb-6">
  <div class="flex gap-2 mb-4">
    <button data-series="actual"      class="toggle-btn active text-xs px-3 py-1 rounded border border-gray-800   bg-gray-800   text-white">Actual</button>
    <button data-series="contributing" class="toggle-btn active text-xs px-3 py-1 rounded border border-green-600  bg-green-600  text-white">Contributing</button>
    <button data-series="contrib401k"  class="toggle-btn active text-xs px-3 py-1 rounded border border-emerald-500 bg-emerald-500 text-white">401k Only</button>
    <button data-series="coast"        class="toggle-btn active text-xs px-3 py-1 rounded border border-blue-500   bg-blue-500   text-white">Coast FIRE</button>
  </div>
  <canvas id="chart-retirement" style="min-height:400px"></canvas>
</div>

<details class="bg-white rounded-lg border border-gray-200 mb-6 text-sm">
  <summary class="px-4 py-3 cursor-pointer text-gray-500 hover:text-gray-700 select-none font-medium">Projection methodology</summary>
  <div id="methodology-body" class="px-4 pb-4 pt-1 border-t border-gray-100 grid grid-cols-1 md:grid-cols-2 gap-6 text-gray-600">
    <div>
      <div class="font-medium text-gray-700 mb-2">Assumptions</div>
      <table class="w-full text-xs">
        <tbody id="method-assumptions"></tbody>
      </table>
    </div>
    <div>
      <div class="font-medium text-gray-700 mb-2">Monthly contributions</div>
      <table class="w-full text-xs">
        <tbody id="method-contributions"></tbody>
      </table>
    </div>
  </div>
</details>

<script>
const charts = {};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function timeLineChart(canvasId, isoData, datasets, yPrefix="", extraPlugins={}) {
  // isoData: array of {x: "YYYY-MM-DD", y: value} per dataset
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext("2d");
  charts[canvasId] = new Chart(ctx, {
    type: "line",
    data: { datasets },
    options: {
      responsive: true,
      plugins: { legend: { display: datasets.length > 1 }, ...extraPlugins },
      scales: {
        x: {
          type: "time",
          time: { unit: "month", tooltipFormat: "MMM d, yyyy", displayFormats: { month: "MMM yy" } },
          ticks: { maxRotation: 45 }
        },
        y: { ticks: { callback: v => yPrefix + v.toLocaleString() } }
      },
      elements: { point: { radius: 2 } }
    }
  });
}

function timeBarChart(canvasId, datasets, yPrefix="", extraPlugins={}, stacked=false) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext("2d");
  charts[canvasId] = new Chart(ctx, {
    type: "bar",
    data: { datasets },
    options: {
      responsive: true,
      plugins: { legend: { display: datasets.length > 1 }, ...extraPlugins },
      scales: {
        x: {
          type: "time",
          stacked,
          time: { unit: "month", tooltipFormat: "MMM d, yyyy", displayFormats: { month: "MMM yy" } },
          ticks: { maxRotation: 45 }
        },
        y: { stacked, ticks: { callback: v => yPrefix + v.toLocaleString() } }
      }
    }
  });
}

function barChart(canvasId, labels, datasets, yPrefix="", stacked=false, tooltipOpts={}) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext("2d");
  charts[canvasId] = new Chart(ctx, {
    type: "bar",
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: { legend: { display: datasets.length > 1 }, tooltip: tooltipOpts },
      scales: {
        x: { stacked },
        y: { stacked, ticks: { callback: v => yPrefix + v.toLocaleString() } }
      }
    }
  });
}

function linearTrend(xyPoints) {
  const n = xyPoints.length;
  if (n < 2) return [];
  const xs = xyPoints.map(p => new Date(p.x).getTime());
  const ys = xyPoints.map(p => p.y);
  const mx = xs.reduce((a, b) => a + b, 0) / n;
  const my = ys.reduce((a, b) => a + b, 0) / n;
  const slope = xs.reduce((s, x, i) => s + (x - mx) * (ys[i] - my), 0) /
                xs.reduce((s, x) => s + (x - mx) ** 2, 0);
  const intercept = my - slope * mx;
  return [xyPoints[0], xyPoints[n - 1]].map(p => ({
    x: p.x,
    y: Math.max(0, Math.round((slope * new Date(p.x).getTime() + intercept) * 100) / 100)
  }));
}

const PERSON_COLORS = {
  "Chris":  { line: "#1d4ed8", fill: "rgba(29,78,216,0.10)",  bar: "#1d4ed8" },
  "Ashley": { line: "#60a5fa", fill: "rgba(96,165,250,0.10)", bar: "#60a5fa" },
};
function personColor(name, key) {
  return (PERSON_COLORS[name] || { line: "#6b7280", fill: "rgba(107,114,128,0.08)", bar: "#6b7280" })[key];
}

function loadCharts() {
  const personId = document.getElementById("person-filter").value;
  fetch("/api/chart-data?person_id=" + personId)
    .then(r => r.json())
    .then(({ rows, ytd }) => {
      // Group rows by person for separate series
      const peopleInData = [...new Set(rows.map(r => r.person))].sort();
      const byPerson = {};
      peopleInData.forEach(p => { byPerson[p] = rows.filter(r => r.person === p); });
      const multiPerson = peopleInData.length > 1;

      function xyFor(person, field) {
        return byPerson[person].filter(r => r[field] != null).map(r => ({ x: r.date, y: r[field] }));
      }
      // Single-person shorthand (when filtered to one person)
      const singleRows = multiPerson ? [] : rows;
      const xy = (field) => singleRows.filter(r => r[field] != null).map(r => ({ x: r.date, y: r[field] }));

      // Summary cards
      const years = Object.keys(ytd).sort();
      const latestYear = years[years.length - 1];
      const ly = ytd[latestYear] || {};
      const cardLabel = multiPerson ? "Combined" : (peopleInData[0] || "");
      document.getElementById("summary-cards").innerHTML = `
        <div class="bg-white rounded-lg border border-gray-200 p-4">
          <div class="text-xs text-gray-500 uppercase mb-1">${latestYear} ${cardLabel} Gross</div>
          <div class="text-2xl font-bold">$${ly.gross.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
        </div>
        <div class="bg-white rounded-lg border border-gray-200 p-4">
          <div class="text-xs text-gray-500 uppercase mb-1">${latestYear} ${cardLabel} Taxes</div>
          <div class="text-2xl font-bold text-red-500">$${ly.taxes.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
        </div>
        <div class="bg-white rounded-lg border border-gray-200 p-4">
          <div class="text-xs text-gray-500 uppercase mb-1">${latestYear} ${cardLabel} 401k</div>
          <div class="text-2xl font-bold text-green-600">$${ly.k401.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
        </div>
        <div class="bg-white rounded-lg border border-gray-200 p-4">
          <div class="text-xs text-gray-500 uppercase mb-1">${latestYear} ${cardLabel} Cash Saved</div>
          <div class="text-2xl font-bold text-blue-600">$${ly.savings.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
        </div>
      `;

      // Gross chart — one line per person; inflation line only for Chris solo
      const grossDatasets = peopleInData.map(p => ({
        label: multiPerson ? p + " Gross" : "Gross",
        data: multiPerson ? xyFor(p, "gross") : xy("gross"),
        borderColor: personColor(p, "line"),
        backgroundColor: personColor(p, "fill"),
        fill: !multiPerson,
        tension: 0.3,
      }));
      const chrisOnly = peopleInData.length === 1;
      const inflationMap = {};
      rows.forEach(r => { if (r.inflation_gross != null) inflationMap[r.date] = r.inflation_gross; });
      if (chrisOnly) {
        grossDatasets.push({ label: "SWE Initial Pay Inflation Adjusted", data: xy("inflation_gross"), borderColor: "#f59e0b", backgroundColor: "transparent", fill: false, tension: 0.3, borderDash: [6,3], pointRadius: 0 });
      }
      timeLineChart("chart-gross", null, grossDatasets, "$", chrisOnly ? {
        tooltip: {
          callbacks: {
            afterBody(items) {
              const grossItem = items.find(i => i.dataset.label === "Gross");
              if (!grossItem) return [];
              const inf = inflationMap[grossItem.raw.x];
              if (inf == null) return [];
              const pct = ((grossItem.raw.y - inf) / inf * 100).toFixed(1);
              return [`${pct >= 0 ? "+" : ""}${pct}% vs inflation-adjusted baseline`];
            }
          }
        }
      } : {});

      // Tax % — red shades per person
      const taxColors = { "Chris": ["#ef4444", "rgba(239,68,68,0.1)"], "Ashley": ["#fca5a5", "rgba(252,165,165,0.1)"] };
      timeLineChart("chart-taxes-pct", null,
        peopleInData.map(p => {
          const [line, fill] = taxColors[p] || ["#ef4444", "rgba(239,68,68,0.1)"];
          return {
            label: multiPerson ? p + " Tax %" : "Tax %",
            data: multiPerson ? xyFor(p, "taxes_pct") : xy("taxes_pct"),
            borderColor: line, backgroundColor: fill,
            fill: !multiPerson, tension: 0.3,
          };
        }), "");

      // Savings % — one line per person
      timeLineChart("chart-savings-pct", null,
        peopleInData.map(p => ({
          label: multiPerson ? p + " Savings %" : "Savings %",
          data: multiPerson ? xyFor(p, "savings_pct") : xy("savings_pct"),
          borderColor: personColor(p, "line"),
          backgroundColor: personColor(p, "fill"),
          fill: !multiPerson, tension: 0.3,
        })), "");

      // 401k — one bar series per person, trend line only for single person
      const grossMap = {};
      rows.forEach(r => { if (r.gross != null) grossMap[r.date] = r.gross; });
      const k401Datasets = peopleInData.map(p => ({
        label: multiPerson ? p + " 401k" : "401k",
        data: multiPerson ? xyFor(p, "total_401k") : xy("total_401k"),
        backgroundColor: personColor(p, "bar"),
        ...(multiPerson ? { stack: "combined" } : {}),
      }));
      if (!multiPerson) {
        const k401data = xy("total_401k");
        const trendData = linearTrend(k401data);
        function trendAt(dateStr) {
          if (trendData.length < 2) return null;
          const t = new Date(dateStr).getTime();
          const t0 = new Date(trendData[0].x).getTime(), t1 = new Date(trendData[1].x).getTime();
          const frac = (t - t0) / (t1 - t0);
          return Math.max(0, Math.round((trendData[0].y + frac * (trendData[1].y - trendData[0].y)) * 100) / 100);
        }
        k401Datasets.push({ label: "Trend", data: trendData, type: "line", borderColor: "#f43f5e", backgroundColor: "transparent", borderWidth: 2, borderDash: [6,3], pointRadius: 0, order: 0 });
        timeBarChart("chart-401k", k401Datasets, "$", {
          tooltip: {
            callbacks: {
              afterBody(items) {
                const bar = items.find(i => i.dataset.label === "401k");
                if (!bar) return [];
                const gross = grossMap[bar.raw.x];
                const trend = trendAt(bar.raw.x);
                const lines = [];
                if (gross) lines.push(`${(bar.raw.y / gross * 100).toFixed(1)}% of gross`);
                if (trend != null) lines.push(`Trend: $${trend.toLocaleString()}`);
                return lines;
              }
            }
          }
        });
      } else {
        timeBarChart("chart-401k", k401Datasets, "$", {}, true);
      }

      // Hours — Chris only
      const hoursData = rows.filter(r => r.hours_worked != null && r.hours_worked > 0)
                            .map(r => ({ x: r.date, y: r.hours_worked }));
      timeLineChart("chart-hours", null,
        [{ label: "Hours", data: hoursData, borderColor: "#f59e0b", backgroundColor: "rgba(245,158,11,0.1)", fill: true, tension: 0.3 }], "");

      // Annual bar — single person: grouped by category; multi-person: each category stacked by person
      const annualLabels = years;
      if (!multiPerson) {
        barChart("chart-annual", annualLabels, [
          { label: "Gross",      data: annualLabels.map(y => ytd[y].gross),     backgroundColor: "#3b82f6" },
          { label: "Take Home",  data: annualLabels.map(y => ytd[y].takehome),  backgroundColor: "#10b981" },
          { label: "Taxes",      data: annualLabels.map(y => ytd[y].taxes),     backgroundColor: "#ef4444" },
          { label: "401k",       data: annualLabels.map(y => ytd[y].k401),      backgroundColor: "#6366f1" },
        ], "$");
      } else {
        // Compute per-person annual totals from rows
        const pYtd = {};
        rows.forEach(r => {
          const yr = r.date.slice(0, 4);
          if (!pYtd[r.person]) pYtd[r.person] = {};
          if (!pYtd[r.person][yr]) pYtd[r.person][yr] = { gross: 0, taxes: 0, k401: 0, takehome: 0 };
          const y = pYtd[r.person][yr];
          y.gross    += r.gross       || 0;
          y.taxes    += r.total_taxes || 0;
          y.k401     += r.total_401k  || 0;
          y.takehome += r.takehome    || 0;
        });
        const catColors = {
          Chris:  { gross: "#1d4ed8", takehome: "#059669", taxes: "#ef4444", k401: "#4f46e5" },
          Ashley: { gross: "#60a5fa", takehome: "#6ee7b7", taxes: "#fca5a5", k401: "#a5b4fc" },
        };
        const annualDatasets = [];
        ["gross", "takehome", "taxes", "k401"].forEach(cat => {
          const catLabel = { gross: "Gross", takehome: "Take Home", taxes: "Taxes", k401: "401k" }[cat];
          peopleInData.forEach(p => {
            annualDatasets.push({
              label: p + " " + catLabel,
              data: annualLabels.map(yr => Math.round((pYtd[p]?.[yr]?.[cat] || 0))),
              backgroundColor: (catColors[p] || catColors.Ashley)[cat],
              stack: cat,
            });
          });
        });
        const stackCatLabel = { gross: "Gross", takehome: "Take Home", taxes: "Taxes", k401: "401k" };
        barChart("chart-annual", annualLabels, annualDatasets, "$", true, {
          callbacks: {
            label: function(item) {
              return `${item.dataset.label}: $${Math.round(item.raw).toLocaleString()}`;
            },
            afterBody: function(items) {
              if (!items.length) return [];
              const item = items[0];
              const stack = item.dataset.stack;
              const dataIndex = item.dataIndex;
              const allInStack = this.chart.data.datasets
                .map((ds, i) => ({ ds, val: ds.data[dataIndex] || 0 }))
                .filter(({ ds }) => ds.stack === stack && ds !== item.dataset);
              if (!allInStack.length) return [];
              const total = allInStack.reduce((s, { val }) => s + val, 0) + (item.raw || 0);
              const cat = stackCatLabel[stack] || stack;
              const lines = allInStack.map(({ ds, val }) => `${ds.label}: $${Math.round(val).toLocaleString()}`);
              lines.push(`─────────────────`);
              lines.push(`${cat} Total: $${Math.round(total).toLocaleString()}`);
              return lines;
            }
          }
        });
      }
    });
}

document.getElementById("person-filter").addEventListener("change", loadCharts);
loadCharts();

Chart.Tooltip.positioners.cursor = function(items, eventPos) {
  if (!items.length) return { x: eventPos.x, y: eventPos.y };
  const nearest = items.reduce((best, item) => {
    const dy = Math.abs(item.element.y - eventPos.y);
    return dy < best.dy ? { dy, item } : best;
  }, { dy: Infinity, item: null }).item;
  return { x: eventPos.x, y: nearest ? nearest.element.y : eventPos.y };
};

let _retirementData = null;
const _seriesVisible = { actual: true, contributing: true, contrib401k: true, coast: true };

document.querySelectorAll(".toggle-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    const key = this.dataset.series;
    _seriesVisible[key] = !_seriesVisible[key];
    this.classList.toggle("opacity-40", !_seriesVisible[key]);
    if (_retirementData) renderRetirementChart(_retirementData);
  });
});

function fmt$(v) {
  if (v >= 1_000_000) return "$" + (v / 1_000_000).toFixed(2) + "M";
  return "$" + Math.round(v).toLocaleString();
}

function renderRetirementChart(data) {
  const { total_history, projections, monthly_contribution, target, birth_year: birthYear = 1990 } = data;
  const latest  = total_history.length ? total_history[total_history.length - 1] : null;
  const cx      = projections.contrib_crossed;
  const coastX  = projections.coast_crossed;

  document.getElementById("retirement-summary-cards").innerHTML = latest ? `
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <div class="text-xs text-gray-500 uppercase mb-1">Current Balance</div>
      <div class="text-2xl font-bold">${fmt$(latest.value)}</div>
      <div class="text-xs text-gray-400 mt-1">${latest.date}</div>
    </div>
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <div class="text-xs text-gray-500 uppercase mb-1">Monthly 401k + Roth IRA</div>
      <div class="text-2xl font-bold text-indigo-600">${fmt$(monthly_contribution)}</div>
    </div>
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <div class="text-xs text-gray-500 uppercase mb-1">$3.5M w/ contributions</div>
      <div class="text-2xl font-bold text-green-600">${cx ? cx.date.slice(0,4) + " · age " + cx.age : "Beyond 2069"}</div>
    </div>
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <div class="text-xs text-gray-500 uppercase mb-1">$3.5M coast only</div>
      <div class="text-2xl font-bold text-blue-600">${coastX ? coastX.date.slice(0,4) + " · age " + coastX.age : "Beyond 2069"}</div>
    </div>
  ` : '<p class="text-sm text-gray-400 col-span-4">No investment data — sync from the Balances tab.</p>';

  if (!total_history.length) return;

  const todayStr = new Date().toISOString().slice(0, 10);
  const datasets = [];

  if (_seriesVisible.actual) {
    datasets.push({
      label: "Actual",
      data: total_history.map(p => ({ x: p.date, y: p.value })),
      borderColor: "#1e293b",
      backgroundColor: "rgba(30,41,59,0.07)",
      borderWidth: 3,
      fill: true,
      tension: 0.3,
      pointRadius: 0,
      order: 0,
    });
  }

  if (_seriesVisible.contributing && projections.current_rate) {
    datasets.push({
      label: "Contributing (10% + $" + Math.round(monthly_contribution).toLocaleString() + "/mo)",
      data: projections.current_rate.map(p => ({ x: p.date, y: p.value })),
      borderColor: "#16a34a",
      backgroundColor: "transparent",
      borderDash: [8, 4],
      borderWidth: 2,
      pointRadius: 0,
      order: 1,
    });
  }

  if (_seriesVisible.contrib401k && projections.contrib_401k_only) {
    datasets.push({
      label: "401k Only (10% + $" + Math.round(data.monthly_401k).toLocaleString() + "/mo)",
      data: projections.contrib_401k_only.map(p => ({ x: p.date, y: p.value })),
      borderColor: "#059669",
      backgroundColor: "transparent",
      borderDash: [5, 5],
      borderWidth: 1.5,
      pointRadius: 0,
      order: 2,
    });
  }

  if (_seriesVisible.coast && projections.coast) {
    datasets.push({
      label: "Coast FIRE (10%, no contributions)",
      data: projections.coast.map(p => ({ x: p.date, y: p.value })),
      borderColor: "#2563eb",
      backgroundColor: "transparent",
      borderDash: [4, 4],
      borderWidth: 2,
      pointRadius: 0,
      order: 3,
    });
  }

  const contrib401kX = projections.contrib_401k_only_crossed;
  const verticals = [];
  if (_seriesVisible.contributing && cx) verticals.push({ date: cx.date, color: "#16a34a", label: cx.date.slice(0,4) + " (age " + cx.age + ")" });
  if (_seriesVisible.contrib401k && contrib401kX) verticals.push({ date: contrib401kX.date, color: "#059669", label: contrib401kX.date.slice(0,4) + " 401k-only (age " + contrib401kX.age + ")" });
  if (_seriesVisible.coast && coastX)   verticals.push({ date: coastX.date, color: "#2563eb", label: coastX.date.slice(0,4) + " (age " + coastX.age + ")" });

  const overlayPlugin = {
    id: "overlay",
    afterDatasetsDraw(chart) {
      const { ctx, scales } = chart;
      // SWR target line: $4.29M at age 45 (2039), $3.33M at age 65 (2059)
      const swr45x = scales.x.getPixelForValue(new Date("2039-01-01").getTime());
      const swr65x = scales.x.getPixelForValue(new Date("2059-01-01").getTime());
      const swr45y = scales.y.getPixelForValue(4290000);
      const swr65y = scales.y.getPixelForValue(3330000);
      const swrSlope = (swr65y - swr45y) / (swr65x - swr45x);
      const swrYLeft  = swr45y + swrSlope * (scales.x.left  - swr45x);
      const swrYRight = swr45y + swrSlope * (scales.x.right - swr45x);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(scales.x.left,  swrYLeft);
      ctx.lineTo(scales.x.right, swrYRight);
      ctx.strokeStyle = "#d97706";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.fillStyle = "#92400e";
      ctx.font = "bold 11px sans-serif";
      ctx.fillText("Target Balance", scales.x.right - 90, swrYRight - 5);
      ctx.restore();
      // Today vertical
      const tx = scales.x.getPixelForValue(todayStr);
      if (tx >= scales.x.left && tx <= scales.x.right) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(tx, scales.y.top);
        ctx.lineTo(tx, scales.y.bottom);
        ctx.strokeStyle = "rgba(100,100,100,0.35)";
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.stroke();
        ctx.fillStyle = "#6b7280";
        ctx.font = "10px sans-serif";
        ctx.fillText("today", tx + 3, scales.y.top + 12);
        ctx.restore();
      }
      // Goal crossing verticals
      verticals.forEach(v => {
        const x = scales.x.getPixelForValue(v.date);
        if (x < scales.x.left || x > scales.x.right) return;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, scales.y.top);
        ctx.lineTo(x, scales.y.bottom);
        ctx.strokeStyle = v.color;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 3]);
        ctx.stroke();
        ctx.fillStyle = v.color;
        ctx.font = "bold 10px sans-serif";
        ctx.fillText(v.label, x + 4, scales.y.top + 26);
        ctx.restore();
      });
    }
  };

  destroyChart("chart-retirement");
  charts["chart-retirement"] = new Chart(
    document.getElementById("chart-retirement").getContext("2d"),
    {
      type: "line",
      data: { datasets },
      plugins: [overlayPlugin],
      options: {
        responsive: true,
        plugins: {
          legend: { display: true, position: "top" },
          tooltip: {
            mode: "x",
            intersect: false,
            position: "cursor",
            filter: (item, index, items) =>
              items.findIndex(i => i.datasetIndex === item.datasetIndex) === index,
            callbacks: {
              title: items => {
                if (!items.length) return "";
                const d = new Date(items[0].parsed.x);
                const age = d.getFullYear() - birthYear;
                const label = d.toLocaleDateString("en-US", { month: "short", year: "numeric" });
                return `${label} · age ${age}`;
              },
              label: i => {
                if (i.parsed.y == null) return null;
                return i.dataset.label + ": " + fmt$(i.parsed.y);
              },
              footer: items => {
                if (!items.length) return "";
                const t  = items[0].parsed.x;
                const t1 = new Date("2039-01-01").getTime();
                const t2 = new Date("2059-01-01").getTime();
                const v  = 4290000 + (3330000 - 4290000) / (t2 - t1) * (t - t1);
                return "Target Balance: " + fmt$(v);
              }
            }
          }
        },
        scales: {
          x: {
            type: "time",
            min: _retirementData.chart_start || "2022-04-01",
            max: "2069-12-01",
            time: { unit: "year", tooltipFormat: "MMM d, yyyy", displayFormats: { year: "yyyy" } },
            ticks: { maxRotation: 0 }
          },
          y: {
            min: 0,
            max: 10_000_000,
            ticks: { callback: v => v >= 1_000_000 ? "$" + (v/1_000_000).toFixed(1) + "M" : "$" + (v/1000).toFixed(0) + "k" }
          }
        },
        elements: { point: { radius: 0 } },
      }
    }
  );
}

function loadBalanceCharts() {
  fetch("/api/balance-chart-data")
    .then(r => r.json())
    .then(data => {
      _retirementData = data;
      renderRetirementChart(data);

      function row(label, value) {
        return `<tr><td class="py-0.5 text-gray-500 pr-4">${label}</td><td class="py-0.5 font-mono text-right">${value}</td></tr>`;
      }

      const retPct = Math.round(data.annual_return * 100);
      document.getElementById("method-assumptions").innerHTML = [
        row("Annual return",         retPct + "%  (compounded monthly)"),
        row("Monthly rate",          (data.annual_return / 12 * 100).toFixed(4) + "%"),
        row("Retirement target",     fmt$(data.target)),
        row("Starting balance",      fmt$(data.active_balance)),
        row("Chart start",           data.chart_start),
        row("Birth year",            data.birth_year),
        row("Coast = no contributions after today", ""),
      ].join("");

      document.getElementById("method-contributions").innerHTML = [
        row("401k avg biweekly",     "$" + data.avg_biweekly_401k.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})),
        row("  × 26 pay periods / 12", "= $" + data.monthly_401k.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + "/mo"),
        row("Roth IRA ($7.5k × 2 / 12)", "$" + data.monthly_roth.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + "/mo"),
        row("─────────────────────", ""),
        row("Total monthly",         "<strong>$" + data.monthly_contribution.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + "/mo</strong>"),
        row("401k source",           "avg of last 24 paychecks &gt; $200"),
      ].join("");
    });
}

loadBalanceCharts();
</script>
{% endblock %}
