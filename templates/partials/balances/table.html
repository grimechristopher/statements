{{ define "partial" }}
<div class="overflow-x-auto rounded-lg border border-gray-200 bg-white">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 text-xs text-gray-500 uppercase">
      <tr>
        <th class="px-3 py-2 text-left">Date</th>
        <th class="px-3 py-2 text-left">Account</th>
        <th class="px-3 py-2 text-left">Type</th>
        <th class="px-3 py-2 text-left">Institution</th>
        <th class="px-3 py-2 text-right">Balance</th>
      </tr>
    </thead>
    <tbody>
      {{ range .Rows }}
      <tr class="border-b border-gray-100 hover:bg-gray-50">
        <td class="px-3 py-2">{{ .Date }}</td>
        <td class="px-3 py-2">{{ .Name }}</td>
        <td class="px-3 py-2">{{ .Type }}</td>
        <td class="px-3 py-2">{{ .Institution }}</td>
        <td class="px-3 py-2 text-right font-mono">{{ dollarF .Balance }}</td>
      </tr>
      {{ end }}
    </tbody>
  </table>
</div>
<p class="text-xs text-gray-400 mt-2">{{ len .Rows }} rows</p>
{{ end }}
