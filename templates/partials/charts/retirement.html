{{ define "partial" }}
<div x-data="{ series: ['history','current_rate','coast','contrib_401k_only'] }" class="space-y-3">
  <div class="flex flex-wrap gap-2 text-xs">
    <button @click="series.includes('history') ? series = series.filter(s=>s!='history') : series.push('history')"
      :class="series.includes('history') ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-400'"
      class="px-2 py-1 rounded">Actual</button>
    <button @click="series.includes('current_rate') ? series = series.filter(s=>s!='current_rate') : series.push('current_rate')"
      :class="series.includes('current_rate') ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-400'"
      class="px-2 py-1 rounded">With Contributions</button>
    <button @click="series.includes('coast') ? series = series.filter(s=>s!='coast') : series.push('coast')"
      :class="series.includes('coast') ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-400'"
      class="px-2 py-1 rounded">Coast (no contrib)</button>
    <button @click="series.includes('contrib_401k_only') ? series = series.filter(s=>s!='contrib_401k_only') : series.push('contrib_401k_only')"
      :class="series.includes('contrib_401k_only') ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-400'"
      class="px-2 py-1 rounded">401k Only</button>
  </div>
  <canvas id="chart-retirement" data-chart-data="{{ jsonAttr .ChartData }}" style="min-height:300px"></canvas>
</div>
{{ end }}
