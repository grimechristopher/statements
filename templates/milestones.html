{{ define "content" }}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-xl font-semibold">Milestones</h1>
</div>

<div class="bg-white rounded-lg border border-gray-200 p-4 mb-8">
  <h2 class="text-sm font-medium text-gray-600 mb-3">Configuration</h2>
  <form hx-post="/api/config" hx-swap="none">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div>
        <label class="block text-xs text-gray-500 mb-1">Current Salary</label>
        <input name="salary" type="number" step="0.01" value="{{ .Config.Salary }}"
               class="w-full border rounded px-2 py-1 text-sm">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Annual Rent / Mortgage</label>
        <input name="annual_rent" type="number" step="0.01" value="{{ .Config.AnnualRent }}"
               class="w-full border rounded px-2 py-1 text-sm">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Salary of First Job</label>
        <input name="first_job_salary" type="number" step="0.01" value="{{ .Config.FirstJobSalary }}"
               class="w-full border rounded px-2 py-1 text-sm">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">Home Equity</label>
        <input name="home_equity" type="number" step="1" value="{{ .Config.HomeEquity }}"
               class="w-full border rounded px-2 py-1 text-sm">
      </div>
    </div>
    <button type="submit" class="mt-3 text-xs px-3 py-1 rounded bg-gray-800 text-white hover:bg-gray-700">Save</button>
    <span id="save-status" class="ml-2 text-xs text-green-600"></span>
  </form>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
  <div class="bg-white rounded-lg border border-gray-200 p-4"
       hx-get="/partials/milestones/fire-chart" hx-trigger="load" hx-swap="innerHTML">
    <div class="text-sm text-gray-400">Loading FIRE chart…</div>
  </div>
  <div class="bg-white rounded-lg border border-gray-200 p-4"
       hx-get="/partials/milestones/swr-chart" hx-trigger="load" hx-swap="innerHTML">
    <div class="text-sm text-gray-400">Loading SWR chart…</div>
  </div>
</div>

<div id="milestone-content"
     hx-get="/partials/milestones/cards" hx-trigger="load" hx-swap="innerHTML" class="space-y-8">
  <div class="text-sm text-gray-400">Loading milestones…</div>
</div>

<div id="benchmarks-card" class="mt-8"
     hx-get="/partials/milestones/benchmarks" hx-trigger="load" hx-swap="innerHTML">
  <div class="text-sm text-gray-400">Loading benchmarks…</div>
</div>
{{ end }}
